<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Join Quiz</title>
<link rel="stylesheet" href="/style.css" />
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; padding: 24px; }
  .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .brand { font-weight: 900; font-size: 1.3rem; margin-bottom: 30px; }
  .brand span { color: var(--amber); }

  input {
    font-family: var(--disp); font-size: 1.1rem; padding: 16px; width: 100%; max-width: 320px;
    border-radius: 12px; border: 2px solid var(--ink-2); background: var(--ink-2); color: var(--paper);
    margin-bottom: 14px; text-align: center;
  }
  input::placeholder { color: rgba(245,243,238,0.4); }

  #status { font-family: var(--mono); font-size: 0.85rem; opacity: 0.7; margin-top: 10px; min-height: 1.2em; }
  #joinError { color: var(--magenta); font-size: 0.85rem; margin-top: -6px; margin-bottom: 10px; min-height: 1em; }

  /* Waiting */
  #waitingView { display: none; }
  .pulse { animation: pulse 1.6s ease-in-out infinite; font-size: 1.1rem; }
  .myScore { font-family: var(--mono); font-size: 2.2rem; margin-top: 20px; color: var(--amber); }

  /* Question */
  #answerView { display: none; width: 100%; }
  #qTextP { font-size: 1.4rem; font-weight: 800; margin-bottom: 24px; padding: 0 8px; }
  .answerGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
  .aBtn {
    border: none; border-radius: 16px; padding: 26px 10px; font-size: 1.15rem; font-weight: 800;
    color: var(--ink); min-height: 110px; display: flex; align-items: center; justify-content: center;
  }
  .aBtn.o0 { background: var(--amber); } .aBtn.o1 { background: var(--teal); }
  .aBtn.o2 { background: var(--magenta); color: var(--paper); } .aBtn.o3 { background: var(--blue); color: var(--paper); }
  .aBtn:disabled { opacity: 0.35; }
  .aBtn.chosen { outline: 4px solid var(--paper); }

  /* Feedback */
  #feedbackView { display: none; }
  .fb-big { font-size: 2.4rem; font-weight: 900; margin-bottom: 10px; }
  .fb-big.correct { color: var(--teal); }
  .fb-big.wrong { color: var(--magenta); }
  .fb-points { font-family: var(--mono); font-size: 1.3rem; }
</style>
</head>
<body>

<div class="brand">CAMPUS<span>QUIZ</span>LIVE</div>

<div class="center">

  <div id="joinView">
    <div class="eyebrow" style="margin-bottom:14px;">Join the quiz</div>
    <input id="nameInput" placeholder="Your name" maxlength="24" />
    <input id="codeInput" placeholder="Room code" maxlength="8" inputmode="numeric" />
    <div id="joinError"></div>
    <button class="btn" id="joinBtn">Join</button>
  </div>

  <div id="waitingView">
    <div class="pulse">🎉 You're in! Waiting for host to start…</div>
    <div class="myScore" id="myScore">0 pts</div>
  </div>

  <div id="answerView">
    <div id="qTextP"></div>
    <div class="answerGrid" id="answerGrid"></div>
  </div>

  <div id="feedbackView">
    <div class="fb-big" id="fbBig"></div>
    <div class="fb-points" id="fbPoints"></div>
    <div class="myScore" id="myScore2"></div>
  </div>

  <div id="endedView" style="display:none;">
    <div class="eyebrow">Quiz Over</div>
    <div class="myScore" id="finalScore"></div>
  </div>

</div>

<div id="status"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const el = id => document.getElementById(id);
let myScore = 0;

// Persistent player id survives reconnects (wifi drops) so score isn't lost
let playerId = localStorage.getItem('quizPlayerId') || '';

const params = new URLSearchParams(location.search);
if (params.get('code')) el('codeInput').value = params.get('code');

function showOnly(id) {
  ['joinView','waitingView','answerView','feedbackView','endedView'].forEach(v =>
    el(v).style.display = (v === id) ? 'block' : 'none');
}

el('joinBtn').onclick = () => {
  const name = el('nameInput').value.trim();
  const code = el('codeInput').value.trim();
  if (!name) { el('joinError').textContent = 'Enter your name.'; return; }
  if (!code) { el('joinError').textContent = 'Enter the room code.'; return; }
  el('joinError').textContent = '';
  socket.emit('player:join', { name, playerId, roomCode: code });
};

socket.on('player:joinError', (data) => {
  el('joinError').textContent = data.message;
});

socket.on('player:joined', (data) => {
  playerId = data.playerId;
  localStorage.setItem('quizPlayerId', playerId);
  if (data.phase === 'question') {
    // handled by question:show below
  } else if (data.phase === 'ended') {
    showOnly('endedView');
  } else {
    showOnly('waitingView');
  }
});

socket.on('question:show', (data) => {
  showOnly('answerView');
  el('qTextP').textContent = data.question;
  const grid = el('answerGrid');
  grid.innerHTML = '';
  data.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `aBtn o${i}`;
    btn.textContent = opt;
    btn.onclick = () => {
      document.querySelectorAll('.aBtn').forEach(b => b.disabled = true);
      btn.classList.add('chosen');
      socket.emit('player:answer', { choiceIndex: i });
      el('status').textContent = 'Answer locked in!';
    };
    grid.appendChild(btn);
  });
});

socket.on('player:answerAck', () => {
  el('status').textContent = 'Waiting for others…';
});

socket.on('you:result', (data) => {
  showOnly('feedbackView');
  myScore = data.totalScore;
  const fb = el('fbBig');
  fb.textContent = data.correct ? 'Correct! ✅' : 'Wrong ❌';
  fb.className = 'fb-big ' + (data.correct ? 'correct' : 'wrong');
  el('fbPoints').textContent = data.correct ? `+${data.pointsEarned} points` : '+0 points';
  el('myScore2').textContent = `${myScore} pts total`;
  el('status').textContent = '';
});

socket.on('game:end', () => {
  showOnly('endedView');
  el('finalScore').textContent = `${myScore} pts final`;
});

socket.on('disconnect', () => {
  el('status').textContent = 'Reconnecting…';
});
</script>
</body>
</html>
